  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14;
      --border: rgba(232,224,208,0.1);
      --text: #e8e0d0;
      --text-muted: rgba(232,224,208,0.55);
      --text-dim: rgba(232,224,208,0.3);
      --gold: #e8c97a;
      --gold-dim: rgba(232,201,122,0.5);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 2.5rem; background: rgba(13,13,20,0.92); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border); }
    .logo { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 400; font-style: italic; color: var(--text); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }
    .wrap { max-width: 680px; margin: 0 auto; padding: 5rem 2.5rem 6rem; }
    .tag { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; display: block; }
    h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 400; line-height: 1.2; color: #f5f0e8; margin-bottom: 2.5rem; }
    p { font-size: 17px; line-height: 1.85; color: var(--text-muted); font-weight: 300; margin-bottom: 1.5rem; }
    p strong { color: var(--text); font-weight: 500; }
    .divider { width: 40px; height: 1px; background: var(--gold-dim); margin: 2.5rem 0; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin: 2.5rem 0; }
    .stat { border-left: 2px solid var(--gold-dim); padding-left: 1rem; }
    .stat-number { font-family: 'Playfair Display', serif; font-size: 28px; color: #f5f0e8; font-weight: 400; }
    .stat-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.3rem; }
    .social-links { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 2rem; }
    .social-link { color: var(--gold); text-decoration: none; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; border: 0.5px solid var(--gold-dim); padding: 0.5rem 1rem; transition: all 0.2s; }
    .social-link:hover { background: rgba(232,201,122,0.08); }
    footer { max-width: 680px; margin: 0 auto; padding: 2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid rgba(232,224,208,0.07); }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic; color: var(--text-dim); text-decoration: none; }
    .footer-note { font-size: 11px; color: var(--text-dim); }
    .nav-yt { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; border: 0.5px solid var(--border); padding: 0.45rem 1rem; transition: all 0.2s; }
    .nav-yt:hover { border-color: var(--gold-dim); color: var(--gold); }
    .nav-burger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-burger span { width: 22px; height: 1.5px; background: var(--text-muted); display: block; }
    @media (max-width: 768px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; flex-direction: column; gap: 0; background: rgba(13,13,20,0.97); border-bottom: 0.5px solid var(--border); padding: 0.75rem 1.25rem; z-index: 99; }
      .nav-links.open { display: flex; }
      .nav-links.open li { padding: 0.5rem 0; border-bottom: 0.5px solid rgba(232,224,208,0.05); }
      .nav-burger { display: flex; }
      .wrap { padding: 3rem 1.25rem 4rem; }
      h1 { font-size: 30px; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      footer { flex-direction: column; gap: 1rem; padding: 1.5rem 1.25rem; }
    }
  </style>
